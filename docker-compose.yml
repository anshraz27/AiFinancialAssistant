services:
  # MongoDB Database
  mongodb:
    image: mongo:7
    container_name: fin_mongodb
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: finscope
    volumes:
      - mongodb_data:/data/db
    
    networks:
      - finapp
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 30s
  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: fin_redis
    ports:
      - "6379:6379"
    
    networks:
      - finapp
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 30s

  # Node.js Backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: fin_backend_image
    container_name: fin_backend

    ports:
      - "5000:5000"

    env_file:
      - ./backend/.env
    environment:
      NODE_ENV: development
      PORT: 5000
      MONGODB_URI: mongodb://mongodb:27017/finscope
      REDIS_URL: redis://redis:6379
    depends_on:
      redis:
        condition: service_healthy
      mongodb:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    volumes:
      - ./backend:/app
      - backend_node_modules:/app/node_modules

    networks:
      - finapp

    command: npm run dev

  # React Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: fin_frontend_image
    container_name: fin_frontend

    ports:
      - "5173:5173"

    environment:
      VITE_API_URL: /api
      BACKEND_PROXY_URL: http://backend:5000

    depends_on:
      - backend

    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules

    networks:
      - finapp

    command: npm run dev -- --host

  # Nginx Reverse Proxy
  nginx:
    image: nginx:1.29-alpine
    container_name: fin_nginx

    ports:
      - "80:80"

    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro

    depends_on:
      - backend
      - frontend

    networks:
      - finapp

networks:
  finapp:
    driver: bridge

volumes:
  mongodb_data:
  backend_node_modules:
  frontend_node_modules: